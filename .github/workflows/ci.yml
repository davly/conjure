name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Sync SvelteKit (.svelte-kit)
        run: npx svelte-kit sync || true

      - name: Build (SvelteKit + TypeScript)
        run: npm run build
        continue-on-error: true # Phase 1 -- adapter-auto warning is acceptable

      - name: Test (Vitest -- cohort firewall + integration)
        run: npm test

      - name: Cohort firewall grep -- KAT-1 hex byte-identity
        run: |
          grep -rn '239a7d0d3f1bbe3a98aede01e2ad818c2db60b7177c02e2f015035b2b5b7dbca' src/ tests/ \
            && echo "KAT-1 hex pin present" \
            || (echo "KAT-1 hex pin MISSING -- cohort firewall fail" && exit 1)

      - name: Cohort firewall grep -- L43 Mirror-Mark wire prefix
        run: |
          grep -rn "lore@v1:" src/ \
            && echo "L43 wire prefix pin present" \
            || (echo "L43 wire prefix pin MISSING -- cohort firewall fail" && exit 1)

      - name: Cohort firewall grep -- R143 LOUD-ONCE prefix
        run: |
          grep -rn "\[LOUD-ONCE-WARNING\]" src/ \
            && echo "R143 LOUD-ONCE prefix pin present" \
            || (echo "R143 LOUD-ONCE prefix pin MISSING -- cohort firewall fail" && exit 1)

      - name: Cohort firewall grep -- R166 REVIEWED_BY_COUNSEL sentinel
        run: |
          grep -rn 'REVIEWED_BY_COUNSEL' src/lib/cohort/legal/ \
            && echo "R166 REVIEWED_BY_COUNSEL sentinel present" \
            || (echo "R166 sentinel MISSING -- cohort firewall fail" && exit 1)

      - name: Cohort firewall grep -- R166 ReviewedByCounsel=false honest default
        run: |
          grep -En 'REVIEWED_BY_COUNSEL:\s*boolean\s*=\s*false' src/lib/cohort/legal/liability_footer.ts \
            && echo "R166 default=false honest sentinel verified" \
            || (echo "R166 default=false sentinel MISSING -- cohort firewall fail" && exit 1)
